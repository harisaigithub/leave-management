services:
  backend:
    build: ./backend
    container_name: leave-management-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_PATH: ./src/db/leave_management.sqlite
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_string}
      JWT_EXPIRES_IN: 1h
      CLIENT_ORIGIN: http://localhost:8080
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    volumes:
      - backend-data:/app/src/db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: leave-management-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
